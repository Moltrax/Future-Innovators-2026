; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:upesy_wroom]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
    madhephaestus/ESP32Servo@^1.1.1
    https://github.com/rfetick/MPU6050_light.git#v1.2.1
    SPI
; Using a local trimmed Arduino Pixy2 library under lib/Pixy2 to avoid
; building the multi-target upstream repository.
lib_ldf_mode = deep
build_flags = -IC:/Users/TomBaumgartl/.platformio/packages/framework-arduinoespressif32/libraries/SPI/src